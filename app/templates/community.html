{% extends "base.html" %}
{% set embed = false %}

{% block title %}MetaKizz Ambassador Challenge{% endblock %}

{% block nav_right %}
<a href="/leaderboard/community" class="text-sm text-gray-400 hover:text-brand-400 transition font-medium">Leaderboard</a>
{% endblock %}

{% block content %}
<div class="relative min-h-[80vh] flex items-center justify-center">
    <!-- Matrix texture background -->
    <div class="absolute inset-0 overflow-hidden">
        <img src="{{ url_for('static', filename='brand/organized/matrix-texture-top.jpg') }}" alt="" class="w-full h-full object-cover opacity-20">
        <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/80 to-black"></div>
    </div>

    <div class="relative max-w-md mx-auto px-4 py-16 text-center">
        <div class="mb-10">
            <img src="{{ url_for('static', filename='brand/organized/matrix-icon.png') }}" alt="MetaKizz" class="w-24 h-24 mx-auto mb-6 rounded-2xl">
            <h1 class="text-3xl font-display font-bold mb-3 tracking-tight">The Unplugging</h1>
            <p class="text-gray-400 font-body">Unplug dancers into the masterclass. Earn rewards. Compete for the top spot.</p>
        </div>

        <form method="POST" class="mb-6">
            <label for="email" class="block text-sm text-gray-400 mb-2 text-left font-medium">Enter your email to access your dashboard</label>
            <div class="flex gap-2">
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    placeholder="your@email.com"
                    class="flex-1 bg-gray-900/80 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-brand-400 focus:ring-1 focus:ring-brand-400 font-body"
                >
                <button type="submit" class="bg-brand-400 hover:bg-brand-300 text-black font-semibold px-6 py-3 rounded-lg transition font-body">
                    Go
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
