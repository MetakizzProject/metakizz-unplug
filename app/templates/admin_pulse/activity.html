{% extends "admin_pulse/_base.html" %}

{% block pulse_content %}
<section class="pulse-placeholder" data-pulse-section="activity">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
    <h2 class="pulse-section-h2" style="margin:0;">Operational pulse</h2>
    <span class="pulse-status-pill">⏳ Scaffold</span>
  </div>
  <p class="pulse-section-lead">
    Last-24h activity, outreach status, and a live event feed for the
    current business operations.
  </p>
  <div class="pulse-empty-card">
    <span class="pulse-empty-icon">⚡</span>
    <p>Activity dashboard scaffolded · data wiring in progress.</p>
  </div>
</section>
{% endblock %}
