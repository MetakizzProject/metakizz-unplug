{% extends "base.html" %}
{% set embed = false %}

{% block title %}MetaKizz — The Unplugging{% endblock %}

{% block content %}
<div class="relative min-h-[85vh] flex items-center justify-center">
    <!-- Matrix texture background -->
    <div class="absolute inset-0 overflow-hidden">
        <img src="{{ url_for('static', filename='brand/organized/matrix-texture-top.jpg') }}" alt="" class="w-full h-full object-cover opacity-15">
        <div class="absolute inset-0 bg-gradient-to-b from-black/50 via-black/80 to-black"></div>
    </div>

    <div class="relative max-w-md mx-auto px-4 py-16 text-center">
        <img src="{{ url_for('static', filename='brand/organized/matrix-icon.png') }}" alt="MetaKizz" class="w-28 h-28 mx-auto mb-8 rounded-2xl">
        <h1 class="text-3xl font-display font-bold mb-3 tracking-tight">The Unplugging</h1>
        <p class="text-gray-400 font-body mb-12">Unplug dancers into the masterclass. Earn rewards. Compete for the top spot.</p>

        <div class="space-y-4">
            <a href="/community" class="block w-full bg-brand-400 hover:bg-brand-300 text-black font-bold py-4 rounded-lg transition text-center font-display text-sm uppercase tracking-wider">
                I'm a Community Member
            </a>
            <a href="/join" class="block w-full bg-gray-900/80 hover:bg-gray-800 text-white font-semibold py-4 rounded-lg transition text-center border border-gray-700/50 font-body">
                I'm New — Join the Challenge
            </a>
        </div>
    </div>
</div>
{% endblock %}
