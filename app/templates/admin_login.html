{% extends "base.html" %}
{% set embed = false %}

{% block title %}Admin Login — MetaKizz{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto px-4 pt-20">
    <h1 class="text-xl font-bold text-center mb-6">Admin Login</h1>
    <form method="POST" class="space-y-4">
        <input
            type="password"
            name="password"
            placeholder="Password"
            required
            class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-brand-500"
        >
        <button type="submit" class="w-full bg-brand-600 hover:bg-brand-500 text-white font-medium py-3 rounded-lg transition">
            Login
        </button>
    </form>
</div>
{% endblock %}
