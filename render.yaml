services:
  - type: web
    name: metakizz-ambassador
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app.app:create_app()"
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: LANDING_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: GHL_WEBHOOK_SECRET
        sync: false
      - key: WHATSAPP_GROUP_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: metakizz-db
          property: connectionString

databases:
  - name: metakizz-db
    plan: basic-256mb
